<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mailing-assist</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js" defer></script>

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/main.js" defer></script>
</head>

<body class="primary-body">
    <header>
        <div class="logo">
            <img src="img/logo.svg" alt="logo">
        </div>
    </header>
    <aside class="left-side">
        <div class="container-btn mail-downroad">
            <div class="wrapper-btn">
                <button class="btn-cta" id="save-mails">
                    <div class="wrapper-icon">
                        <i class="icon-download" aria-hidden="true">
                            <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M38 26V34C38 35.0609 37.5786 36.0783 36.8284 36.8284C36.0783 37.5786 35.0609 38 34 38H6C4.93913 38 3.92172 37.5786 3.17157 36.8284C2.42143 36.0783 2 35.0609 2 34V26M10 16L20 26M20 26L30 16M20 26V2" />
                            </svg>
                        </i>
                    </div>
                    <span>メールを作成する</span>
                </button>
            </div>
        </div>
        <div class="container__address-select-area anchor-popover__variable-editor">
            <div class="wrapper__address-select-area">
                <div class="container__selected-address-sets">
                    <h3>
                        <span>宛先</span><span><span id="selected-count">0</span>件</span>
                    </h3>
                    <div class="table-flame">
                        <div class="table-container custom-scrollbar__y">
                            <table class="selected-address-sets table__one-column">
                                <tbody id="selected-address-sets">
                                    <tr>
                                        <td colspan="2">宛先を選択してください</td>
                                    </tr>
                                    <tr data-id="address-cb-XXX">
                                        <td>${labelText}</td>
                                        <td class="remove-cell">
                                            <button class="remove-selected" data-id="${checkboxId}">
                                                <i class="icon-remove" aria-hidden="true">
                                                    <svg class="icon-backspace" viewBox="0 0 48 36">
                                                        <path
                                                            d="M36 12L24 24M24 12L36 24M42 2H16L2 18L16 34H42C43.0609 34 44.0783 33.5786 44.8284 32.8284C45.5786 32.0783 46 31.0609 46 30V6C46 4.93913 45.5786 3.92172 44.8284 3.17157C44.0783 2.42143 43.0609 2 42 2Z" />
                                                    </svg>
                                                </i>
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="container-btn">
                    <div class="wrapper-btn">
                        <button class="btn-icon-moving-left anchor-popover__address-sets select-btn__address-sets"
                            popovertarget="menu__address-sets" id="select-btn__address-sets">
                            <div class="wrapper-icon">
                                <i class="icon-plus" aria-hidden="true">
                                    <svg viewBox="0 0 31 31" xmlns="http://www.w3.org/2000/svg">
                                        <line x1="16" y1="10" x2="16" y2="22" />
                                        <line x1="10" y1="16" x2="22" y2="16" />
                                    </svg>
                                </i>
                            </div>
                            <span>宛先を追加する</span>
                        </button>
                    </div>
                </div>

                <div id="menu__address-sets" popover class="container__popover">
                    <ul id="address-options">
                        <!-- <li>
                            <label for="address-cb-${item.id}">
                                <input type="checkbox" class="address-checkbox" id="address-cb-${item.id}"
                                    data-id="address-cb-${item.id}" value="${item.id}"
                                    data-set-name="${item.setName || '名称未設定'}" ${isChecked}>
                                <span>${item.setName || '名称未設定'}</span>
                            </label>
                        </li> -->
                    </ul>
                </div>

                <div class="container-btn">
                    <div class="wrapper-btn">
                        <button class="btn-icon-moving-left btn__variable-edit" id="btn__variable-edit"
                            popovertarget="menu__variable-editor">
                            <div class="wrapper-icon">
                                <i class="icon-variable" aria-hidden="true">
                                    <svg viewBox="0 0 26 18" xmlns="http://www.w3.org/2000/svg">
                                        <path
                                            d="M3.92225 1C2.85963 1 1.99821 2.71923 1.99821 4.84V7.045L1.30143 7.91437C0.899522 8.41571 0.899522 9.58429 1.30143 10.0856L1.99821 10.9544V13.16C1.99821 15.2808 2.85963 17 3.92225 17" />
                                        <path
                                            d="M22.0778 1C23.1404 1 24.0018 2.71923 24.0018 4.84V7.045L24.6986 7.91437C25.1005 8.41571 25.1005 9.58429 24.6986 10.0856L24.0018 10.9544V13.16C24.0018 15.2808 23.1404 17 22.0778 17" />
                                        <path d="M9.34558 3.37939H10.9345L15.0655 14.6204H16.6544" />
                                        <path d="M16.3499 3.37939H14.8934L11.1066 14.6204H9.65013" />
                                    </svg>
                                </i>
                            </div>
                            <span>差込を編集する</span>
                        </button>
                    </div>
                </div>

                <div id="menu__variable-editor" popover class="menu__variable-editor container__popover">
                    <table id="variable-editor-table" class="table__with-two-cards">
                        <thead id="variable-editor-header">
                            <th class="is-start is-end">宛先セット</th>
                            <th class="is-start">{{会社名}}</th>
                            <th class="is-end">{{名前}}</th>
                        </thead>
                        <tbody id="variable-editor-tablebody">
                            <tr>
                                <td class="is-start is-end"><textarea name="" id=""></textarea></td>
                                <td class="is-start"><textarea name="" id=""></textarea></td>
                                <td class=""><textarea name="" id=""></textarea></td>
                                <td class="is-end"><textarea name="" id=""></textarea></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="container-btn">
            <div class="wrapper-btn">
                <button class="btn-icon-moving-left" id="btnOpenEditor">
                    <div class="wrapper-icon">
                        <i class="icon-user" aria-hidden="true">
                            <svg viewBox="0 0 26 25" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="13" cy="6.25" r="5.25" />
                                <path
                                    d="M13 14.5C17.7433 14.5 23.8667 16.5614 24.6513 18.5708C25.4359 20.5802 24.6513 23.125 24.6513 23.125H1.34874C1.34874 23.125 0.564144 20.5802 1.34874 18.5708C2.13333 16.5614 8.25679 14.5 13 14.5Z" />
                            </svg>
                        </i>
                    </div>
                    <span>宛先リストを編集する</span>
                </button>
            </div>
        </div>
    </aside>
    <main>
        <div class="container-main">

            <section class="mail-template-select-container">
                <div class="container__mail-template-header">
                    <h3>テンプレート選択</h3>
                </div>
                <div class="container-btn">
                    <div class="wrapper-btn">
                        <button>
                            <i class="icon-slicer" aria-hidden="true">
                                <svg viewBox="0 0 18 10" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 1H17" />
                                    <path d="M3 5H15" />
                                    <path d="M4 9H14" />
                                </svg>
                            </i>
                        </button>
                    </div>
                </div>

                <div id="container-mail-templates" class="wrapper-mail-templates custom-scrollbar__y">
                    <label class="mail-template-list-container" for="template-XXX">
                        <div class="container__card--mail-template">
                            <input type="radio" name="template-group" data-id="" id="template-XXX"
                                class="card--mail-template">
                            <div class="wrapper-icon">
                                <i class="icon-" aria-hidden="true">
                                    <!-- アイコンを入れる -->
                                </i>
                            </div>
                            <div class="wrapper-text">
                                <h3 class="text-subject">件名が入ります件名が入ります件名が入ります件名が入ります</h3>
                                <p class="text-addressee">
                                    <span>宛先セット1</span><span>宛先セット2</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span>
                                </p>
                            </div>
                            <div class="preview-body">
                                <p>
                                    本文のプレビューが入ります。本文のプレビューが入ります。本文のプレビューが入ります。本文のプレビューが入ります
                                </p>
                            </div>
                        </div>
                    </label>
                    <label class="mail-template-list-container" for="template-XXXX">
                        <div class="container__card--mail-template">
                            <input type="radio" name="template-group" data-id="" id="template-XXXX"
                                class="card--mail-template">
                            <div class="wrapper-icon">
                                <i class="icon-" aria-hidden="true">
                                    <!-- アイコンを入れる -->
                                </i>
                            </div>
                            <div class="wrapper-text">
                                <h3 class="text-subject">件名が入ります件名が入ります件名が入ります件名が入ります</h3>
                                <p class="text-addressee">
                                    <span>宛先セット1</span><span>宛先セット2</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span><span>宛先セット3</span>
                                </p>
                            </div>
                            <div class="preview-body">
                                <p>
                                    本文のプレビューが入ります。本文のプレビューが入ります。本文のプレビューが入ります。本文のプレビューが入ります
                                </p>
                            </div>
                        </div>
                    </label>
                </div>

            </section>
            <section class="editor-container">
                <div class="subject-container">
                    <input type="text" class="subject-input" id="subject-input"
                        placeholder="件名を入力してください（例：{{company}}様へのお知らせ）">
                </div>
                <div class="editor-wrapper">
                    <div id="editor">
                        <p>ここにメール本文を書いてください。</p>
                        <p>宛先ごとに変えたい部分は <strong>{{名前}}</strong> のように設定できます。</p>
                    </div>
                </div>
            </section>
            <div class="btn-save-position">
                <div class="wrapper-btn btn-save">
                    <button id="btn-save-template" class="btn-icon-moving-left">
                        <div class="wrapper-icon">
                            <i class="icon-save" aria-hidden="true">
                                <svg viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M19.6667 25V14.3333H6.33333V25M6.33333 1V7.66667H17M22.3333 25H3.66667C2.95942 25 2.28115 24.719 1.78105 24.219C1.28095 23.7189 1 23.0406 1 22.3333V3.66667C1 2.95942 1.28095 2.28115 1.78105 1.78105C2.28115 1.28095 2.95942 1 3.66667 1H18.3333L25 7.66667V22.3333C25 23.0406 24.719 23.7189 24.219 24.219C23.7189 24.719 23.0406 25 22.3333 25Z"
                                        stroke-linejoin="round" />
                                </svg>
                            </i>
                        </div>
                        <span>テンプレート保存する</span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>自動差し替え変数：{{TODAY-n}} {{TODAY}} {{TODAY+n}}</p>
        <small>&copy; 2026 Shimamura Yusuke.</small>
    </footer>

    <!-- db操作画面 -->
    <dialog id="modal-editor" class="modal">
        <div id="modal-editor-wrapper" class="modal-editor-wrapper glass-effect">
            <h2 class="edit-address-sets__title" id="edit-address-sets__title">宛先セット編集</h2>
            <div class="table-container custom-scrollbar__y">
                <table class="table__with-two-cards">
                    <thead>
                        <th class="is-start is-end">
                            <div class="glass-effect">宛先セット</div>
                        </th>
                        <th class="is-start">
                            <div class="glass-effect">会社名</div>
                        </th>
                        <th class="">
                            <div class="glass-effect">名前</div>
                        </th>
                        <th class="">
                            <div class="glass-effect">TO</div>
                        </th>
                        <th class="is-end">
                            <div class="glass-effect">CC</div>
                        </th>
                        <th class="is-end">
                            <div class="glass-effect">BCC</div>
                        </th>
                        <th class="remove-btn">

                        </th>
                    </thead>
                    <tbody id="address-sets-editor-table">
                        <tr>
                            <td class="is-start is-end"><input type="text" placeholder="(株)○○"></td>
                            <td class="is-start"><input type="text" placeholder="株式会社○○　資材部"></td>
                            <td class=""><input type="text" placeholder="敬称略：カンマ区切り"></td>
                            <td class=""><input type="text" placeholder="「;」で複数指定"></td>
                            <td class=""><input type="text" placeholder="「;」で複数指定"></td>
                            <td class=""><input type="text" placeholder="「;」で複数指定"></td>
                            <td class="remove-cell is-end">
                                <button class="remove-address-set">
                                    <i class="icon-remove" aria-hidden="true">
                                        <svg data-target="${checkboxId}" class="icon-backspace" viewBox="0 0 48 36">
                                            <path
                                                d="M36 12L24 24M24 12L36 24M42 2H16L2 18L16 34H42C43.0609 34 44.0783 33.5786 44.8284 32.8284C45.5786 32.0783 46 31.0609 46 30V6C46 4.93913 45.5786 3.92172 44.8284 3.17157C44.0783 2.42143 43.0609 2 42 2Z" />
                                        </svg>
                                    </i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="container-btn">
                <div class="wrapper-btn">
                    <button class="btn" id="modal-editor__add-row">
                        <div class="wrapper-icon">
                            <i class="icon-plus" aria-hidden="true">
                                <svg viewBox="0 0 31 31" xmlns="http://www.w3.org/2000/svg">
                                    <line x1="16" y1="10" x2="16" y2="22" />
                                    <line x1="10" y1="16" x2="22" y2="16" />
                                </svg>
                            </i>
                        </div>
                    </button>
                </div>
            </div>
            <div class="modal-editor__actions">
                <button id="modal-editor__ok" class="btn" type="button">OK</button>
                <button id="modal-editor__cancel" class="btn" type="button">キャンセル</button>
            </div>
        </div>
    </dialog>

    <!-- カスタムメッセージ　モーダル表示用 -->
    <dialog id="modal" class="modal">
        <div class="modal__panel" id="modal__panel">
            <h2 class="modal__title" id="modal__title">タイトル</h2>
            <p class="modal__text" id="modal__text">メッセージ内容が入ります</p>

            <div class="modal__actions">
                <button id="modal__ok" type="button">OK</button>
                <button id="modal__cancel" type="button">NO</button>
            </div>
        </div>
    </dialog>
    <!-- モーダルここまで -->
</body>

</html>
