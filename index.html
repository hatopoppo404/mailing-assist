<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mailing-assist</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js" defer></script>

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <script type="module" src="js/main.js" defer></script>
</head>

<body style="background-color: aquamarine;">
    <div class="table-container">
        <table class="table__one-column">
            <thead>
                <th>ヘッダー</th>
                <th></th>
            </thead>
            <tr>
                <td>A1</td>
                <td>B1</td>
            </tr>
            <tr>
                <td>A2</td>
                <td>B2</td>
            </tr>
        </table>
    </div>

    <div id="customAlert" class="customAlert modal-overlay">
        <div class="modal-content">
            <h2 id="alertTitle" class="alertTitle">確認</h2>
            <p id="alertMessage" class="alertMessage">メッセージ</p>
            <button id="alertClose" class="alertClose">OK</button>
        </div>
    </div>
    <div id="customConfirm" class="customConfirm modal-overlay">
        <div class="modal-content">
            <h2 id="confirmTitle" class="confirmTitle">確認</h2>
            <p id="confirmMessage" class="confirmMessage">メッセージ</p>
            <div class="confirmBtn">
                <button id="confirmOk" class="confirmOk">OK</button>
                <button id="confirmCancel" class="confirmCancel">Cancel</button>
            </div>
        </div>
    </div>
</body>

</html>
